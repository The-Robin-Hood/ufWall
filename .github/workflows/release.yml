name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build binaries
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/ufWall-linux-amd64 ./cmd/ufWall
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o dist/ufWall-linux-arm64 ./cmd/ufWall

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ufWall-linux-amd64
            dist/ufWall-linux-arm64
          generate_release_notes: true
